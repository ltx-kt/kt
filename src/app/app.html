<div class="scene" [class.scene--transitioning]="isAnimating()">
  <div class="cube" #cubeEl [style.transform]="cubeTransform()">

    <!-- Front: Home -->
    <div class="cube__face cube__face--front" (click)="onFaceClick(0)">
      <div class="face-content">
        <h1 class="person__name">Kevin Tran</h1>
        <p class="person__role">Software Engineer</p>
      </div>
    </div>

    <!-- Bottom: About -->
    <div class="cube__face cube__face--bottom" (click)="onFaceClick(1)">
      <div class="face-content">
        <h2 class="face-heading">About</h2>
        <p class="face-body">
          Software engineer passionate about building fast,
          accessible web experiences and clean systems design.
        </p>
      </div>
    </div>

    <!-- Back: Projects -->
    <div class="cube__face cube__face--back" (click)="onFaceClick(2)">
      <div class="face-content">
        <h2 class="face-heading">Projects</h2>
        <p class="face-body">Coming soon.</p>
      </div>
    </div>

    <!-- Top: Contact -->
    <div class="cube__face cube__face--top" (click)="onFaceClick(3)">
      <div class="face-content">
        <h2 class="face-heading">Contact</h2>
        <p class="face-body">
          <a href="https://github.com/ltx-kt" class="face-link" target="_blank" rel="noopener">
            github.com/ltx-kt
          </a>
        </p>
      </div>
    </div>

  </div>
</div>
